name: CI/CD Pipeline — talentupq

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Integración Continua
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev libpq-dev gcc

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Ejecutar pruebas automatizadas
        run: pytest tests/ -v

      - name: Verificar build de Docker
        run: |
          IMAGE_LC=$(echo "ghcr.io/${{ github.repository_owner }}/talentupq" | tr '[:upper:]' '[:lower:]')
          docker build -t ${IMAGE_LC}:test .

  cd:
    name: Despliegue Continuo
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
   
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Definir imagen en minúsculas
        run: echo "IMAGE_LC=$(echo 'ghcr.io/${{ github.repository_owner }}/talentupq' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar imagen Docker
        run: |
          docker build -t ${{ env.IMAGE_LC }}:latest \
                       -t ${{ env.IMAGE_LC }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_LC }}:latest
          docker push ${{ env.IMAGE_LC }}:${{ github.sha }}

      - name: Desplegar en VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/talentupq
            docker pull $(echo "ghcr.io/${{ github.repository_owner }}/talentupq" | tr '[:upper:]' '[:lower:]'):latest
            docker compose up -d 
            sleep 5
            curl -f http://localhost:5000/health || exit 1
            echo "Deploy exitoso: $(date)"
